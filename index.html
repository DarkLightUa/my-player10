<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player</title>
    
    <!-- === SECURITY SCRIPT: DOMAIN PROTECTION === -->
    <script>
        // Define your allowed domain here
        const allowedDomain = "forjamaroc.com";
        
        // Function to check domain
        function checkReferrer() {
            // If testing locally (file://), allow it for your own debugging
            if (window.location.protocol === "file:") return;

            // Check if page is inside an iframe
            const isIframe = window !== window.top;
            const referrer = document.referrer;
            let isAllowed = false;

            if (isIframe && referrer) {
                try {
                    const refUrl = new URL(referrer);
                    if (refUrl.hostname.includes(allowedDomain)) {
                        isAllowed = true;
                    }
                } catch (e) {
                    console.error("Invalid referrer URL");
                }
            }

            // If not allowed, block the content
            if (!isAllowed) {
                document.documentElement.innerHTML = `
                    <body style="background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:Arial;">
                        <div style="text-align:center;">
                            <h2>Unauthorized Use</h2>
                            <p>This player can only be viewed on <b>${allowedDomain}</b></p>
                        </div>
                    </body>`;
            }
        }
        
        // Run check immediately
        checkReferrer();
    </script>
    <!-- ========================================== -->

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://snrt.player.easybroadcast.io">
    <link rel="preconnect" href="https://blogger.googleusercontent.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            /* Disable text selection */
            user-select: none; 
            -webkit-user-select: none;
        }
        
        /* --- UI FIX: Flexbox Centering & Aspect Ratio --- */
        #player-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center; /* This perfectly centers the iframe vertically */
            background: #000;
            overflow: hidden;
        }
        
        #player-frame {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9; /* Forces the iframe into standard video format */
            border: none;
            background: #000;
            z-index: 1;
        }
        
        .loading-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            transition: opacity 0.5s;
        }
        
        .loading-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .loading-image.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #user-counter {
            position: absolute;
            top: 15px;
            right: 15px;
            color: white;
            font-size: 16px;
            z-index: 5;
            opacity: 0.6;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    
    <div class="loading-image" id="loadingImage">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiZmRslaovrVP07DAR3DXHelJJx1FOAqt_-LyC5mGL0rC6nw28ZMku-kZ9C1gfdd09gRI85vsKgpE19r50rwM3_2rtMn_qGQg6Wk1KEaQy1GYWxpLDoi-Qt9gCa_ToPpsFrwTLzVPCEaYg7V_-E79uUIoUlYNVccisZZq8So82F9iEy7SkDMI2ZGlbgq-h4/s320/Untitled%20design%20-%202025-09-20T011659.168.png" alt="Loading">
    </div>
    
    <div id="player-container">
        <!-- User Counter Icon & Number -->
        <div id="user-counter">
            <i class="fas fa-users"></i>
            <span id="viewer-count"></span> 
        </div>
       
        <iframe id="player-frame" 
                src="https://snrt.player.easybroadcast.io/events/73_laayoune_pgagr52"
                allow="autoplay; fullscreen"
                onload="onPlayerLoad()"></iframe>
    </div>
    
    <script>
        // === SECURITY: DISABLE RIGHT CLICK ===
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // === PLAYER & COUNTER LOGIC ===
        document.addEventListener('DOMContentLoaded', function() {
            const userCounter = document.getElementById('user-counter');

            // Fullscreen Logic
            function handleFullscreenChange() {
                if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
                    userCounter.style.display = 'none';
                } else {
                    userCounter.style.display = 'flex';
                }
            }

            document.addEventListener('fullscreenchange', handleFullscreenChange);
            document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
            document.addEventListener('mozfullscreenchange', handleFullscreenChange);
            document.addEventListener('MSFullscreenChange', handleFullscreenChange);

            // Viewer Count Logic
            const viewerCountElement = document.getElementById('viewer-count');
            const minViewers = 50; 
            const maxViewers = 100; 

            let currentViewers = Math.floor(Math.random() * (maxViewers - minViewers + 1)) + minViewers;
            viewerCountElement.textContent = currentViewers;

            function updateViewerCount() {
                const change = Math.floor(Math.random() * 5) - 2; 
                let newViewers = currentViewers + change;
                newViewers = Math.max(minViewers, Math.min(maxViewers, newViewers));
                currentViewers = newViewers;
                viewerCountElement.textContent = currentViewers;
            }

            setInterval(updateViewerCount, 3000);
        });
        
        function onPlayerLoad() {
            const loadingImage = document.getElementById('loadingImage');
            loadingImage.classList.add('hidden');
        }
    </script>
</body>
</html>
